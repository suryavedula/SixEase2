<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233b82f6'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='white'%3E%E2%97%86%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Wealth Advisor Workbench</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash of the wrong theme.
      // Mirrors src/theme/ThemeProvider.tsx (same key + fallback logic).
      (function () {
        try {
          var saved = localStorage.getItem("waw-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
