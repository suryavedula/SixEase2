# Alembic config (TASK-004, EPIC-01).
# The DB URL is NOT set here — migrations/env.py pulls it from app settings
# (the asyncpg DSN), so there is a single source of truth and no second driver.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use a UTC, sortable, zero-padded prefix for new revision files.
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
